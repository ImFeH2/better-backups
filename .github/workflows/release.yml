name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Check release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MOD_VERSION="$(grep '^mod_version=' gradle.properties | cut -d= -f2)"
          test "$VERSION" = "$MOD_VERSION"

      - name: Collect release artifact
        run: |
          mkdir -p release
          VERSION="${GITHUB_REF_NAME#v}"
          cp "build/libs/better-backups-${VERSION}.jar" release/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: release/*.jar
          generate_release_notes: true

      - name: Sync Modrinth description
        run: ./gradlew modrinthSyncBody
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}

      - name: Publish to Modrinth
        run: ./gradlew modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID }}
